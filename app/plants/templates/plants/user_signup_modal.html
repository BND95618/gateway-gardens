<!-- /app/plants/templates/plants/user_signup_modal.html -->

  <div class="bnd-modal-container">
    <header class="bnd-modal-header">
      <h3>User Sign-Up</h3>
      {% if messages %}
        {% for message in messages %}
          <p class="bnd-text-red">Error: {{ message }}</p>
        {% endfor %}
      {% endif %}
    </header>
    <form action="{% url 'plants:user_signup' %}" method="post">
      {% csrf_token %}
      <div class="bnd-modal-contents">
        {{ form.as_p }}
      </div>
      <div class="bnd-modal-button-bar">
        <button type="submit" class="bnd-button-submit">Signup</button>
        <!-- Cancel signup - the page reload clears the modal and keeps the page from hanging -->
        <button type="button"
                onclick="document.getElementById('signup_modal').style.display='none'"
                class="bnd-button-cancel">
          Cancel
        </button>
      </div>
    </form>
  </div>
