<!-- app/plants/templates/plants/myplant_status_modal.html -->

<div class="bnd-modal-container">
    <div class="bnd-modal-header">
      <h4> {{ plant.commonName }} Status</h4>
    </div>
    <form class="bnd-modal-contents" action="{% url 'plants:myplant_status' plant.id %}" method="post">
      {% csrf_token %}
      <div class="bnd-modal-contents">
        <p>Select status of the plant in "My Plants":</p>
          
          <input type="radio" name="my_plant_status" id="in_my_garden"     
                 value="in_my_garden"
                 {% if status == "in_my_garden" %} checked {% endif %}
          >
          <label for="in_my_garden">In My Garden</label><br>

          <input type="radio" name="my_plant_status" id="wish_list"        
                 value="wish_list"
                 {% if status == "wish_list" %} checked {% endif %}
          >
          <label for="wish_list">Wish List</label><br>

          <input type="radio" name="my_plant_status" id="not_in_my_garden" 
                 value="not_in_my_garden" 
                 {% if status == "not_in_my_garden" %} checked {% endif %}
          >
          <label for="not_in_my_garden">Not in My Garden</label>

      </div>
      <div class="bnd-modal-button-bar">
        <button type="submit" class="bnd-button-submit">Confirm</button>
        <a href="{% url 'plants:plants_summary' %}">
          <button type="button" class="bnd-button-cancel">Cancel</button>
        </a>
      </div>
    </form>
  </div>
