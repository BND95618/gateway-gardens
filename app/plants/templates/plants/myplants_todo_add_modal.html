<!-- /plants/templates/plants/myplants_todo_add_modal.html -->
<div class="bnd-modal-container">
  <header class="bnd-modal-header">
    <h4>Add To Do Item</h4>
  </header>
  <!-- To Do add - create form -->
  <!-- Required for django_flatpickr - date input widget -->
  {{ form.media }}
  <form action="{% url 'plants:myplants_todo_add' myGarden.id%}" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="bnd-modal-contents">
      <label for="id_common_name">Common Name:</label>
      <br/>
      <select id="id_common_name" name="common_name" class="bnd-select bnd-margin-bottom">
        <option value="---" selected> --- </option>
        {% for myPlant in myPlants %}
          <option value="{{ myPlant.plant.commonName }}">{{ myPlant.plant.commonName }}</option>
        {% endfor %}
      </select>
      <br/>

      <label for="todo_date">Date:</label>
      <br/>
      <input type="date" id="id_todo_date" name="todo_date"/>
      <br/>

      <label for="id_todo_action">Action:</label>
      <br/>
      <select id="id_todo_action" name="todo_action" class="bnd-select bnd-margin-bottom">
        <option value="---" selected> --- </option>
        {% for todo_action in todo_action_opt %}
          <option value="{{ todo_action }}" >{{ todo_action }}</option>
        {% endfor %}
      </select>
      <br/>

      <label for="id_todo_repeat">Repeat:</label>
      <br/>
      <select id="id_todo_repeat" name="todo_repeat" class="bnd-select bnd-margin-bottom">
        <option value="---" selected> --- </option>
        {% for todo_repeat in todo_repeat_opt %}
          <option value="{{ todo_repeat }}" >{{ todo_repeat }}</option>
        {% endfor %}
      </select>
      <br/>

      <label for="id_todo_details">Details:</label>
      <br/>
      <input type="text" id="id_todo_details" class="bnd-margin-bottom" name="todo_details">
      <br/>
    </div>

    <div class="bnd-modal-button-bar">
      <!-- To Do add - submit -->
      <button type="submit" class="bnd-button-submit">Submit</button>
      <!-- To Do add - cancel -->
      <button type="button"
              onclick="document.getElementById('todo_add_modal').style.display='none'"
              class="bnd-button-cancel">
        Cancel
      </button>
    </div>
  </form>
</div>
